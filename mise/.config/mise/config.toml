[settings]
experimental = true
lockfile = false
go.default_packages_file = "~/.config/mise/default/golang"
go.set_gopath = true
jobs = 4
pipx.uvx = true
python.compile = true
python.default_packages_file = "~/.config/mise/default/python"
raw = false
status.show_env = true
trusted_config_paths = [ '~/.config/mise' ]

[tools]
deno = "latest"
go = "latest"
lua = "5.1"
node = "latest"
php = "8.4.4"
python = "latest"
ruby = "latest"
rust = "latest"
zig = "latest"
# ---
"aqua:phiresky/ripgrep-all" = "latest"
# ---
"cargo:eza" = "latest"
"cargo:vimv" = "latest"
# ---
"github:achristmascarl/rainfrog" = "latest"
"github:ajenbo/phpantom_lsp" = "latest"
"github:akiomik/mado" = "latest"
"github:astral-sh/uv" = "latest"
"github:boxdot/gurk-rs" = { version = "latest", extract_all = "true" }
"github:cargo-bins/cargo-binstall" = "latest"
"github:carthage-software/mago" = "latest"
"github:dandavison/delta" = "latest"
"github:jdx/usage" = "latest"
"github:michel-kraemer/zsh-patina" = { version = "latest", postinstall = '''
  mkdir -p $XDG_CACHE_HOME/zsh-snap/eval
  rm -f $XDG_CACHE_HOME/zsh-snap/eval/zsh-patina.zsh{,.zwc} $XDG_DATA_HOME/zsh/site-functions/_zsh-patina{,.zwc}
''' }
"github:symfony-cli/symfony-cli" = { version = "latest", exe = "symfony" }
"github:typst/typst" = "latest"
